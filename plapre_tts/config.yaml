name: "Plapre TTS"
version: "1.0.17"
slug: "plapre_tts_server"
description: "Danish neural TTS — syvai/plapre-pico running locally on CPU"
url: "https://huggingface.co/syvai/plapre-pico"
arch:
  - amd64
startup: services
boot: auto
init: false
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Plapre REST API"
ingress: true
ingress_port: 8000
panel_icon: mdi:microphone
panel_title: "Plapre TTS"
map:
  - data:rw
options:
  model: "syvai/plapre-pico"
  speaker: "ida"
schema:
  model: str
  speaker: list(tor|ida|liv|ask|kaj)
  hf_token: str
